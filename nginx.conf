server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Comprime o que vale a pena. WebP, woff2, PNG e JPG já são comprimidos:
  # passar gzip neles só gasta CPU e não encolhe nada.
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/css text/html application/javascript image/svg+xml application/json;

  # Os assets nunca mudam de conteúdo sem mudar de nome: o navegador pode
  # guardar para sempre e nem perguntar de novo.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # O HTML, o CSS e o JS mudam quando eu publico. O navegador guarda, mas sempre
  # confere se mudou antes de reusar. Sem isso, uma correção sua poderia levar
  # dias para chegar em quem já visitou o site.
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
